<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Background Gradient matching your site theme -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B132B" />
      <stop offset="100%" stop-color="#1C2541" />
    </linearGradient>
    
    <!-- Glow/Accent Gradient matching your header typography -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3A86FF" />
      <stop offset="100%" stop-color="#8338EC" />
    </linearGradient>
  </defs>

  <!-- Rounded App-Icon Style Base -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)" />

  <!-- Magnifying Glass Rim -->
  <circle cx="28" cy="28" r="14" fill="none" stroke="url(#accentGrad)" stroke-width="5" />
  
  <!-- Magnifying Glass Handle -->
  <line x1="38" y1="38" x2="50" y2="50" stroke="url(#accentGrad)" stroke-width="5" stroke-linecap="round" />

  <!-- Inner Check/Data marker -->
  <circle cx="28" cy="28" r="5" fill="#3A86FF" opacity="0.8" />
</svg>
