const log = document.getElementById('log');

function addLog(msg, cls) {
  const p = document.createElement('p');
  p.className = cls || '';
  p.textContent = msg;
  log.appendChild(p);
  log.scrollTop = log.scrollHeight;
}

function submitUrl(url) {
  return new Promise((resolve) => {
    const img = new Image();
    const start = Date.now();
    img.onload = () => { addLog('[OK] ' + url + ' (' + (Date.now()-start) + 'ms)', 'ok'); resolve(true); };
    img.onerror = () => { addLog('[?] ' + url + ' (no-confirm, may be accepted)', 'info'); resolve(true); };
    img.src = 'https://api.indexnow.org/indexnow?url=' + encodeURIComponent(url) + '&key=' + KEY;
    setTimeout(() => resolve(true), 5000);
  });
}

async function submitAll() {
  log.innerHTML = '';
  addLog('Submitting ' + URLS.length + ' URLs to IndexNow...', 'info');
  addLog('');
  
  let ok = 0;
  for (let i = 0; i < URLS.length; i++) {
    addLog('[' + (i+1) + '/' + URLS.length + '] ' + URLS[i], 'info');
    const result = await submitUrl(URLS[i]);
    if (result) ok++;
    await new Promise(r => setTimeout(r, 300));
  }
  
  addLog('');
  addLog('COMPLETE! ' + ok + '/' + URLS.length + ' URLs submitted to IndexNow!', 'ok');
  addLog('Bing will crawl these URLs within 24-48 hours.', 'info');
}
