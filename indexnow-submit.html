<html>
<head>
<meta property="og:url" content="https://detecthiddenfees.com/indexnow-submit.html" />
<meta property="og:title" content="IndexNow Submit" />
<title>IndexNow — Index All URLs</title>
<style>
body{font-family:system-ui;max-width:800px;margin:50px auto;padding:20px;background:#111;color:#eee}
button{background:#2563eb;color:white;border:none;padding:16px 32px;border-radius:8px;cursor:pointer;font-size:18px}
button:hover{background:#1d4ed8}
#log{background:#1a1a2e;padding:15px;border-radius:8px;max-height:500px;overflow-y:auto;margin-top:20px;font-family:monospace;font-size:13px}
.ok{color:#4ade80}.err{color:#f87171}.info{color:#60a5fa}.warn{color:#fbbf24}
h1{color:#93c5fd}p{color:#cbd5e1}
</style>
<script type="application/ld+json">

</script>
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"Home","item":"https://detecthiddenfees.com/"},{"@type":"ListItem","position":2,"name":"IndexNow — Index All URLs","item":"https://detecthiddenfees.com/indexnow-submit.html"}]}

</head>
<body>
<h1>IndexNow — Submit All Sitemap URLs</h1>
<p>This page reads your live sitemap.xml and submits every URL to Bing IndexNow.</p>
<p>The status column will show EXACTLY what Bing returns.</p>
<button onclick="doSubmit()">Submit All URLs to IndexNow</button>
<div id="log"><span class="info">Ready. Click the button to start.</span></div>
<script>
const KEY='241f89e1cd603413c1ee2de939c63dbb';
const log=document.getElementById('log');
function add(msg,cls){const p=document.createElement('p');p.className=cls||'';p.textContent=msg;log.appendChild(p);log.scrollTop=log.scrollHeight}

async function doSubmit(){
  log.innerHTML='';
  add('Fetching sitemap.xml...','info');
  let urls=[];
  try{
    const res=await fetch('/sitemap.xml');
    const xml=await res.text();
    const r=/<loc>([^<]+)<\/loc>/g;let m;
    while((m=r.exec(xml))!==null)urls.push(m[1]);
    add('Found '+urls.length+' URLs in sitemap','info');
    add('');
  }catch(e){add('Error fetching sitemap: '+e.message,'err');return}

  let ok=0,fail=0;
  for(let i=0;i<urls.length;i++){
    const url=urls[i];
    try{
      const apiUrl='https://api.indexnow.org/indexnow?url='+encodeURIComponent(url)+'&key='+KEY+'&keyLocation='+encodeURIComponent('https://detecthiddenfees.com/indexnow-key.txt');
      const r=await fetch(apiUrl);
      const txt=await r.text();
      if(r.ok){add('['+(i+1)+'/'+urls.length+'] OK '+url,'ok');ok++}
      else{add('['+(i+1)+'/'+urls.length+'] FAIL '+r.status+' '+url+' - '+txt.substring(0,80),'err');fail++}
    }catch(e){add('['+(i+1)+'/'+urls.length+'] ERR '+url+' '+e.message,'err');fail++}
    await new Promise(r=>setTimeout(r,200));
  }
  add('');
  add('DONE: '+ok+' OK, '+fail+' FAILED','info');
  if(ok===0)add('All failed with 403 — Cloudflare Pages blocks IndexNow API. Use Bing Webmaster Tools instead.','warn');
}
</script>
</body>
</html>
